<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonnenzeit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0b429;
    --amber: #e07b39;
    --blush: #f5c6a0;
    --white: #fdf6ee;
    --muted: rgba(253,246,238,0.45);
    --card: rgba(255,255,255,0.045);
    --border: rgba(240,180,41,0.18);
  }

  body {
    min-height: 100vh;
    background: #0f0b18;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  .sky {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 110%, #e07b3940 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, #f0b42918 0%, transparent 50%),
                linear-gradient(180deg, #0a0812 0%, #1a1025 40%, #2b1a0e 100%);
    animation: skyPulse 8s ease-in-out infinite alternate;
  }
  @keyframes skyPulse {
    0%  { filter: brightness(1); }
    100%{ filter: brightness(1.12); }
  }

  .stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 5%,  rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 38%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 35%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  .horizon {
    position: fixed; bottom: 0; left: 0; right: 0; height: 220px; z-index: 0;
    background: linear-gradient(0deg, #e07b3918 0%, transparent 100%);
  }

  .sun-orb {
    position: fixed; bottom: -90px; left: 50%; transform: translateX(-50%);
    width: 180px; height: 180px; border-radius: 50%; z-index: 0;
    background: radial-gradient(circle, #f0b429bb 0%, #e07b3933 50%, transparent 70%);
    filter: blur(22px);
    animation: sunPulse 4s ease-in-out infinite alternate;
  }
  @keyframes sunPulse {
    0%  { transform: translateX(-50%) scale(1);   opacity: 0.6; }
    100%{ transform: translateX(-50%) scale(1.18); opacity: 0.9; }
  }

  .container {
    position: relative; z-index: 10;
    max-width: 480px; margin: 0 auto;
    padding: 32px 20px 48px;
  }

  /* ── HEADER ── */
  header { text-align: center; margin-bottom: 20px; }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 8vw, 3.4rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  h1 em { font-style: italic; color: var(--gold); }

  .version-line {
    margin-top: 6px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .version-line .ver { color: var(--gold); opacity: 0.8; }
  .version-line .sep { opacity: 0.3; }

  /* Shown only when no city stored */
  .welcome {
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 1.8;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 14px 0;
  }

  /* ── COUNTDOWN BIG ── */
  .countdown-block {
    text-align: center;
    padding: 10px 0 6px;
  }
  .countdown-event-name {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .countdown-digits {
    font-family: 'Space Mono', monospace;
    font-size: clamp(3.8rem, 14vw, 5.2rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--white);
    line-height: 1;
  }
  .countdown-at {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── CITY LINE ── */
  .city-line {
    text-align: center;
    padding: 6px 0 2px;
  }
  .city-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    font-style: italic;
    color: var(--blush);
    letter-spacing: 0.05em;
  }
  .city-coords {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── INFO ROWS ── */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
  }
  .info-label {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .info-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.03em;
  }
  .info-value.gold { color: var(--gold); }

  /* ── RISE / SET ROW ── */
  .riseset-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    gap: 8px;
  }
  .riseset-item {
    display: flex; align-items: center; gap: 7px;
    flex: 1;
  }
  .riseset-item.right { justify-content: flex-end; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .dot.rise { background: #a8d8ff; box-shadow: 0 0 6px #a8d8ff88; }
  .dot.set  { background: var(--gold); box-shadow: 0 0 6px #f0b42988; }
  .riseset-label { font-size: 9px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
  .riseset-time  { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: var(--white); }

  /* Day progress bar */
  .daybar-track {
    height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px;
    position: relative; overflow: visible; margin: 8px 0 4px;
  }
  .daybar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #a8d8ff, var(--gold), var(--amber));
    transition: width 0.8s cubic-bezier(0.23,1,0.32,1);
  }
  .daybar-now {
    position: absolute; top: -3px; width: 2px; height: 9px;
    background: white; border-radius: 1px; box-shadow: 0 0 5px white;
  }

  /* ── INPUT AREA ── */
  .search-wrap { margin-top: 18px; }

  .input-row {
    display: flex; gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 5px 5px 14px;
    transition: border-color 0.3s;
  }
  .input-row:focus-within { border-color: rgba(240,180,41,0.45); }
  .input-row input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--white); letter-spacing: 0.04em;
  }
  .input-row input::placeholder { color: var(--muted); }

  .btn {
    background: var(--gold); color: #1a1025;
    border: none; border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 14px; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--amber); transform: scale(1.03); }
  .btn:active { transform: scale(0.97); }

  .hint {
    margin-top: 6px; font-size: 9px;
    letter-spacing: 0.14em; color: var(--muted); text-align: center;
  }

  /* ── ERROR / LOADING ── */
  .error {
    background: rgba(220,60,60,0.1);
    border: 1px solid rgba(220,60,60,0.25);
    border-radius: 4px; padding: 8px 14px;
    font-size: 11px; color: #ffaaaa;
    margin-top: 10px; display: none; letter-spacing: 0.04em;
  }
  .loading {
    display: none; text-align: center;
    padding: 16px; font-size: 10px;
    letter-spacing: 0.2em; color: var(--muted);
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4,end) infinite;
  }
  @keyframes dots {
    0%  { content: ''; } 25% { content: '.'; }
    50% { content: '..'; } 75% { content: '...'; }
  }

  footer {
    text-align: center; margin-top: 32px;
    font-size: 8px; letter-spacing: 0.18em;
    color: rgba(253,246,238,0.15);
  }

  /* Data section visibility */
  #dataSection { display: none; }
  #dataSection.visible { display: block; }
  #welcomeText { display: none; }
  #welcomeText.visible { display: block; }
</style>
</head>
<body>
<div class="sky"></div>
<div class="stars"></div>
<div class="horizon"></div>
<div class="sun-orb"></div>

<div class="container">

  <header>
    <h1>Sonnen<em>zeit</em></h1>
    <div class="version-line">
      <span class="ver" id="versionBadge"></span>
      <span class="sep">·</span>
      <span>Arry Smivvers Studios</span>
    </div>
  </header>

  <!-- Shown only when no city in localStorage -->
  <div id="welcomeText">
    <div class="divider"></div>
    <div class="welcome">
      Solar Calculator<br>
      Auf- &amp; Untergang · Countdown · Tageslänge
    </div>
  </div>

  <!-- Data section (hidden until city loaded) -->
  <div id="dataSection">
    <div class="divider"></div>

    <!-- Countdown -->
    <div class="countdown-block">
      <div class="countdown-event-name" id="nextEventName">—</div>
      <div class="countdown-digits" id="countdownTimer">00:00:00</div>
      <div class="countdown-at" id="nextEventAt"></div>
    </div>

    <div class="divider"></div>

    <!-- City -->
    <div class="city-line">
      <div class="city-name" id="locTitle"></div>
      <div class="city-coords" id="locCoords"></div>
    </div>

    <div class="divider"></div>

    <!-- Tageslänge -->
    <div class="info-row">
      <span class="info-label">Tageslänge</span>
      <span class="info-value gold" id="daylengthVal">—</span>
    </div>

    <!-- Day progress bar -->
    <div class="daybar-track">
      <div class="daybar-fill" id="daybarFill" style="width:0%"></div>
      <div class="daybar-now"  id="daybarNow"  style="left:0%"></div>
    </div>

    <div class="divider"></div>

    <!-- Rise / Set in one row -->
    <div class="riseset-row">
      <div class="riseset-item">
        <span class="dot rise"></span>
        <span class="riseset-label">Aufgang</span>
        <span class="riseset-time" id="riseTime">—</span>
      </div>
      <div class="riseset-item right">
        <span class="riseset-time" id="setTime">—</span>
        <span class="riseset-label">Untergang</span>
        <span class="dot set"></span>
      </div>
    </div>

  </div><!-- /dataSection -->

  <div class="divider"></div>

  <!-- Input -->
  <div class="search-wrap">
    <div class="input-row">
      <input type="text" id="cityInput" placeholder="Stadt, Land — z.B. Berlin, Deutschland" autocomplete="off">
      <button class="btn" onclick="calculate()">OK</button>
    </div>
    <div class="hint">Enter drücken oder OK</div>
  </div>

  <div class="error"   id="errorBox"></div>
  <div class="loading" id="loadingBox"><span class="loading-dots">Berechne</span></div>

  <footer>Berechnung nach Meeus/SPA · Ortszeit des gewählten Standorts</footer>
</div>

<script>
const RELEASE_VERSION = '1.1';
document.getElementById('versionBadge').textContent = 'v' + RELEASE_VERSION;

// ─── SUN MATH ────────────────────────────────────────────────────────────────
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

function jday(date) {
  const y = date.getUTCFullYear(), m = date.getUTCMonth()+1, d = date.getUTCDate();
  const h = date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600;
  let A = Math.floor(y/100), B = 2 - A + Math.floor(A/4);
  if(m <= 2){ return Math.floor(365.25*(y-1)) + Math.floor(30.6001*(m+13)) + d + h/24 + 1720994.5 + B; }
  return Math.floor(365.25*y) + Math.floor(30.6001*(m+1)) + d + h/24 + 1720994.5 + B;
}

function solPosition(jd) {
  const T = (jd - 2451545.0) / 36525;
  const L0 = (280.46646 + T*(36000.76983 + T*0.0003032)) % 360;
  const M  = (357.52911 + T*(35999.05029 - T*0.0001537)) * DEG;
  const C  = (1.914602 - T*(0.004817 + 0.000014*T))*Math.sin(M)
           + (0.019993 - 0.000101*T)*Math.sin(2*M)
           + 0.000289*Math.sin(3*M);
  const lon = (L0 + C) * DEG;
  const omega = (125.04 - 1934.136*T) * DEG;
  const lambda = lon - 0.00569*DEG - 0.00478*DEG*Math.sin(omega);
  const e = (23.439291111 - T*(0.013004167 + T*(0.0000001638 - T*0.0000005036))) * DEG
           + 0.00256*DEG*Math.cos(omega);
  const decl = Math.asin(Math.sin(e)*Math.sin(lambda));
  const eqtime = 4*(L0*DEG - 0.0569 - 0.0478*Math.sin(omega) - Math.atan2(Math.cos(e)*Math.sin(lon), Math.cos(lon))*RAD) * DEG;
  return { decl, eqtime };
}

function sunTimes(dateLocal, lat, lng, tzOffset) {
  const noon = new Date(dateLocal.getTime() - tzOffset*60000 + 12*3600000);
  const jd = jday(noon);
  const { decl, eqtime } = solPosition(jd);
  const latR = lat * DEG;
  const zenith = 90.833 * DEG;
  const cosHA = (Math.cos(zenith) - Math.sin(latR)*Math.sin(decl))
               / (Math.cos(latR)*Math.cos(decl));
  if(cosHA < -1) return { polarDay: true };
  if(cosHA >  1) return { polarNight: true };
  const HA = Math.acos(cosHA) * RAD;
  const solarNoon = 720 - 4*lng - eqtime + tzOffset;
  const rise = solarNoon - 4*HA;
  const set  = solarNoon + 4*HA;
  const toHHMM = m => {
    const total = ((m % 1440) + 1440) % 1440;
    const h = Math.floor(total/60), min = Math.round(total%60);
    return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  };
  const riseMin = ((rise % 1440) + 1440) % 1440;
  const setMin  = ((set  % 1440) + 1440) % 1440;
  const cosAz = (Math.sin(decl) - Math.sin(latR)*Math.cos(zenith))
               / (Math.cos(latR)*Math.sin(Math.acos(cosHA)));
  const az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * RAD;
  return { rise: toHHMM(rise), set: toHHMM(set), riseMin, setMin,
           daylengthMin: setMin - riseMin, azRise: Math.round(az), azSet: Math.round(360 - az) };
}

// ─── GEOCODING ────────────────────────────────────────────────────────────────
async function geocode(query) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=de&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Geocoding fehlgeschlagen');
  const data = await res.json();
  if(!data.results?.length) throw new Error(`Ort nicht gefunden: "${query}"`);
  const r = data.results[0];
  return { lat: r.latitude, lon: r.longitude, timezone: r.timezone,
           displayName: [r.name, r.country].filter(Boolean).join(', ') };
}

async function getTzOffset(lat, lng, ianaTimezone) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&timezone=${encodeURIComponent(ianaTimezone)}&current_weather=false&hourly=temperature_2m&forecast_days=1`;
    const r = await fetch(url);
    if(!r.ok) throw new Error();
    const d = await r.json();
    return d.utc_offset_seconds ?? Math.round(lng / 15) * 3600;
  } catch {
    return Math.round(lng / 15) * 3600;
  }
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
let countdownInterval = null;
let nextEventUTC = null;

function startCountdown() {
  if(countdownInterval) clearInterval(countdownInterval);
  if(!nextEventUTC) return;
  function tick() {
    const diff = nextEventUTC - Date.now();
    if(diff <= 0) { document.getElementById('countdownTimer').textContent = '00:00:00'; return; }
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    document.getElementById('countdownTimer').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

// ─── CALCULATE ────────────────────────────────────────────────────────────────
async function calculate() {
  const query = document.getElementById('cityInput').value.trim();
  if(!query) return;

  const errorBox   = document.getElementById('errorBox');
  const loadingBox = document.getElementById('loadingBox');
  const dataSection = document.getElementById('dataSection');

  errorBox.style.display = 'none';
  dataSection.classList.remove('visible');
  loadingBox.style.display = 'block';

  try {
    const geo = await geocode(query);
    const { lat, lon: lng, displayName, timezone } = geo;
    const tzOffsetSec = await getTzOffset(lat, lng, timezone);
    const tzOffsetMin = tzOffsetSec / 60;

    const nowUTC   = new Date();
    const nowLocal = new Date(nowUTC.getTime() + tzOffsetSec*1000);
    const midnightLocal = new Date(Date.UTC(
      nowLocal.getUTCFullYear(), nowLocal.getUTCMonth(), nowLocal.getUTCDate()
    ));

    const times = sunTimes(midnightLocal, lat, lng, tzOffsetMin);
    loadingBox.style.display = 'none';

    if(times.polarDay)   throw new Error('Polartag – keine Zeiten verfügbar');
    if(times.polarNight) throw new Error('Polarnacht – keine Zeiten verfügbar');

    // Fill data
    document.getElementById('locTitle').textContent  = displayName;
    document.getElementById('locCoords').textContent = `${lat.toFixed(4)}° N  ${lng.toFixed(4)}° E`;
    document.getElementById('riseTime').textContent  = times.rise;
    document.getElementById('setTime').textContent   = times.set;

    const dlH = Math.floor(times.daylengthMin/60);
    const dlM = Math.round(times.daylengthMin%60);
    document.getElementById('daylengthVal').textContent = `${dlH}h ${dlM}min`;

    // Day bar
    const nowMinLocal = nowLocal.getUTCHours()*60 + nowLocal.getUTCMinutes();
    const pct = Math.max(0, Math.min(100,
      (nowMinLocal - times.riseMin) / (times.setMin - times.riseMin) * 100
    ));
    document.getElementById('daybarFill').style.width = pct + '%';
    document.getElementById('daybarNow').style.left   = pct + '%';

    // Countdown
    const riseUTC = new Date(midnightLocal.getTime() + times.riseMin * 60000 - tzOffsetSec*1000);
    const setUTC  = new Date(midnightLocal.getTime() + times.setMin  * 60000 - tzOffsetSec*1000);

    if(nowUTC < riseUTC) {
      nextEventUTC = riseUTC.getTime();
      document.getElementById('nextEventName').textContent = 'Sonnenaufgang in';
      document.getElementById('nextEventAt').textContent   = `heute um ${times.rise} Uhr`;
    } else if(nowUTC < setUTC) {
      nextEventUTC = setUTC.getTime();
      document.getElementById('nextEventName').textContent = 'Sonnenuntergang in';
      document.getElementById('nextEventAt').textContent   = `heute um ${times.set} Uhr`;
    } else {
      const tomorrowMidnight = new Date(midnightLocal.getTime() + 86400000);
      const tTimes = sunTimes(tomorrowMidnight, lat, lng, tzOffsetMin);
      const tRiseUTC = new Date(tomorrowMidnight.getTime() + tTimes.riseMin * 60000 - tzOffsetSec*1000);
      nextEventUTC = tRiseUTC.getTime();
      document.getElementById('nextEventName').textContent = 'Sonnenaufgang in';
      document.getElementById('nextEventAt').textContent   = `morgen um ${tTimes.rise} Uhr`;
    }

    startCountdown();
    localStorage.setItem('sonnenzeit_lastCity', query);

    // Show data, hide welcome
    document.getElementById('welcomeText').classList.remove('visible');
    dataSection.classList.add('visible');

  } catch(err) {
    loadingBox.style.display = 'none';
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  }
}

// Enter key
document.getElementById('cityInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') calculate();
});

// Init
(function() {
  const last = localStorage.getItem('sonnenzeit_lastCity');
  if(last) {
    document.getElementById('cityInput').value = last;
    calculate();
  } else {
    document.getElementById('welcomeText').classList.add('visible');
  }
})();
</script>
</body>
</html>
